name: Build TypeHere OSK Mod

# Trigger on every push to any branch and on pull requests to main
on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ main ]
  # Allow running this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  build:
    name: Build with JDK 25
    runs-on: ubuntu-latest

    steps:
      # 1. Check out your repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Install JDK 25 (GA release, available since September 2025)
      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      # 3. Cache Gradle files so subsequent builds are much faster
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # 4. Give the Gradle wrapper execute permission
      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      # 5. Build the mod (Fabric Loom handles downloading MC + mappings automatically)
      - name: Build mod
        run: ./gradlew build --stacktrace
        env:
          # Gradle Loom needs to be able to write to the user home
          GRADLE_USER_HOME: /home/runner/.gradle

      # 6. Upload the compiled mod JAR and sources JAR as downloadable artifacts
      #    After the workflow finishes, go to the run → "Artifacts" section to download them
      - name: Upload mod JARs
        uses: actions/upload-artifact@v4
        with:
          name: typehere-osk-mod-jars
          path: |
            build/libs/*.jar
          if-no-files-found: error
          retention-days: 30
